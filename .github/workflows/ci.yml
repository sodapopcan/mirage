name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

env:
  MIX_ENV: test
  ELIXIR_VERSION: "1.19.4"
  OTP_VERSION: "28.3"

jobs:
  human-authored:
    name: Human-authored commits
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Reject AI-authored commits
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            range="${{ github.event.pull_request.base.sha }}..${{ github.event.pull_request.head.sha }}"
          else
            range="HEAD~1..HEAD"
          fi

          ai_patterns=(
            "claude"
            "anthropic"
            "copilot"
            "openai"
            "github-actions\[bot\]"
            "dependabot\[bot\]"
            "noreply@anthropic.com"
            "noreply@github.com"
          )

          pattern=$(IFS="|"; echo "${ai_patterns[*]}")

          while IFS= read -r sha; do
            author=$(git log -1 --format='%an <%ae>' "$sha")
            committer=$(git log -1 --format='%cn <%ce>' "$sha")

            if echo "$author" | grep -iEq "$pattern"; then
              echo "::error::Commit $sha has AI author: $author"
              exit 1
            fi

            if echo "$committer" | grep -iEq "$pattern"; then
              echo "::error::Commit $sha has AI committer: $committer"
              exit 1
            fi
          done < <(git rev-list "$range")

          echo "All commits are human-authored."

      - name: Reject conventional commit messages
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            range="${{ github.event.pull_request.base.sha }}..${{ github.event.pull_request.head.sha }}"
          else
            range="HEAD~1..HEAD"
          fi

          prefixes="feat|fix|chore|docs|style|refactor|perf|test|build|ci|revert"

          while IFS= read -r sha; do
            subject=$(git log -1 --format='%s' "$sha")

            if echo "$subject" | grep -Eq "^($prefixes)(\(.+\))?!?:"; then
              echo "::error::Commit $sha uses conventional commit style: $subject"
              exit 1
            fi
          done < <(git rev-list "$range")

          echo "No conventional commit messages found."

  compile:
    name: Compile
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: erlef/setup-beam@v1
        with:
          elixir-version: ${{ env.ELIXIR_VERSION }}
          otp-version: ${{ env.OTP_VERSION }}

      - uses: actions/cache@v4
        with:
          path: |
            deps
            _build
          key: mix-${{ runner.os }}-${{ env.ELIXIR_VERSION }}-${{ env.OTP_VERSION }}-${{ hashFiles('mix.lock') }}
          restore-keys: |
            mix-${{ runner.os }}-${{ env.ELIXIR_VERSION }}-${{ env.OTP_VERSION }}-

      - run: mix deps.get
      - run: mkdir -p priv/static
      - run: mix compile --warnings-as-errors

  format:
    name: Check formatting
    runs-on: ubuntu-latest
    needs: compile
    steps:
      - uses: actions/checkout@v4

      - uses: erlef/setup-beam@v1
        with:
          elixir-version: ${{ env.ELIXIR_VERSION }}
          otp-version: ${{ env.OTP_VERSION }}

      - uses: actions/cache@v4
        with:
          path: |
            deps
            _build
          key: mix-${{ runner.os }}-${{ env.ELIXIR_VERSION }}-${{ env.OTP_VERSION }}-${{ hashFiles('mix.lock') }}

      - run: mix deps.get
      - run: mkdir -p priv/static
      - run: mix format --check-formatted

  test:
    name: Tests
    runs-on: ubuntu-latest
    needs: compile
    steps:
      - uses: actions/checkout@v4

      - uses: erlef/setup-beam@v1
        with:
          elixir-version: ${{ env.ELIXIR_VERSION }}
          otp-version: ${{ env.OTP_VERSION }}

      - uses: actions/cache@v4
        with:
          path: |
            deps
            _build
          key: mix-${{ runner.os }}-${{ env.ELIXIR_VERSION }}-${{ env.OTP_VERSION }}-${{ hashFiles('mix.lock') }}

      - run: mix deps.get
      - run: mkdir -p priv/static
      - run: mix test

  sobelow:
    name: Sobelow
    runs-on: ubuntu-latest
    needs: compile
    steps:
      - uses: actions/checkout@v4

      - uses: erlef/setup-beam@v1
        with:
          elixir-version: ${{ env.ELIXIR_VERSION }}
          otp-version: ${{ env.OTP_VERSION }}

      - uses: actions/cache@v4
        with:
          path: |
            deps
            _build
          key: mix-${{ runner.os }}-${{ env.ELIXIR_VERSION }}-${{ env.OTP_VERSION }}-${{ hashFiles('mix.lock') }}

      - run: mix deps.get
      - run: mkdir -p priv/static
      - run: mix sobelow --skip --exit

  dialyzer:
    name: Dialyzer
    runs-on: ubuntu-latest
    needs: compile
    steps:
      - uses: actions/checkout@v4

      - uses: erlef/setup-beam@v1
        with:
          elixir-version: ${{ env.ELIXIR_VERSION }}
          otp-version: ${{ env.OTP_VERSION }}

      - uses: actions/cache@v4
        with:
          path: |
            deps
            _build
          key: mix-${{ runner.os }}-${{ env.ELIXIR_VERSION }}-${{ env.OTP_VERSION }}-${{ hashFiles('mix.lock') }}

      - uses: actions/cache@v4
        with:
          path: priv/plts
          key: plt-${{ runner.os }}-${{ env.ELIXIR_VERSION }}-${{ env.OTP_VERSION }}-${{ hashFiles('mix.lock') }}

      - run: mix deps.get
      - run: mkdir -p priv/static
      - run: mix dialyzer
